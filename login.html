<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — MyApp</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --dark: #080808;
    --dark2: #0f0f0f;
    --dark3: #171717;
    --white: #f5f0e8;
    --gray: #666;
    --error: #ef4444;
    --success: #22c55e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  /* LEFT PANEL */
  .left-panel {
    background: var(--dark2);
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 48px;
  }
  .left-panel::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 60%, rgba(201,168,76,0.12), transparent 60%);
  }

  .panel-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    position: relative;
    z-index: 1;
    text-decoration: none;
    color: var(--white);
  }
  .panel-logo span { color: var(--gold); }

  .panel-quote {
    position: relative; z-index: 1;
  }
  .panel-quote blockquote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    line-height: 1.2;
    font-style: italic;
    color: var(--white);
    margin-bottom: 24px;
  }
  .panel-quote em { color: var(--gold); font-style: normal; }
  .panel-quote cite {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray);
    font-style: normal;
  }

  .panel-features {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; gap: 16px;
  }
  .panel-feature {
    display: flex; align-items: center; gap: 12px;
    font-size: 0.85rem;
    color: rgba(245,240,232,0.6);
  }
  .panel-feature::before {
    content: '✓';
    width: 22px; height: 22px;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    font-size: 0.7rem;
    flex-shrink: 0;
  }

  /* BIG TEXT */
  .big-text {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20rem;
    font-weight: 700;
    color: rgba(201,168,76,0.03);
    bottom: -60px;
    right: -40px;
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  /* RIGHT PANEL */
  .right-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 48px;
    position: relative;
  }

  .form-container {
    width: 100%;
    max-width: 420px;
  }

  .form-header { margin-bottom: 36px; }
  .form-welcome {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    line-height: 1.1;
  }
  .form-subtitle { color: var(--gray); font-size: 0.9rem; margin-top: 8px; }

  /* TABS */
  .tabs {
    display: flex;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: none;
    color: var(--gray);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.25s;
  }
  .tab-btn.active {
    background: var(--gold);
    color: var(--dark);
  }

  /* FORM */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.5);
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--white);
    padding: 14px 16px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.3s;
    outline: none;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-input::placeholder { color: rgba(245,240,232,0.2); }

  .form-submit {
    width: 100%;
    background: var(--gold);
    color: var(--dark);
    border: none;
    padding: 15px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
  }
  .form-submit:hover { background: #e8c96d; }
  .form-submit:disabled { opacity: 0.6; cursor: not-allowed; }

  .divider {
    display: flex; align-items: center; gap: 16px;
    margin: 20px 0;
    color: var(--gray);
    font-size: 0.8rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    color: var(--error);
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
  }
  .success-msg {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.2);
    color: var(--success);
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 0.85rem;
    margin-bottom: 16px;
    display: none;
  }

  .form-footer {
    margin-top: 28px;
    text-align: center;
    color: var(--gray);
    font-size: 0.8rem;
  }

  .back-nav {
    position: absolute;
    top: 32px; left: 48px;
    display: flex; align-items: center; gap: 8px;
    color: var(--gray);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .back-nav:hover { color: var(--gold); }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; }
    .left-panel { display: none; }
    .right-panel { padding: 40px 24px; }
    .back-nav { top: 20px; left: 24px; }
  }
</style>
</head>
<body>

<!-- LEFT -->
<div class="left-panel">
  <a href="index.html" class="panel-logo">My<span>App</span></a>

  <div class="panel-quote">
    <blockquote>Security is not a<br>product — it's a<br><em>state of mind.</em></blockquote>
    <cite>MyApp Philosophy</cite>
  </div>

  <div class="panel-features">
    <div class="panel-feature">BCrypt password encryption</div>
    <div class="panel-feature">JWT token authentication</div>
    <div class="panel-feature">Spring Boot backend</div>
    <div class="panel-feature">Railway cloud infrastructure</div>
  </div>

  <div class="big-text">M</div>
</div>

<!-- RIGHT -->
<div class="right-panel">
  <a href="index.html" class="back-nav">← Back</a>

  <div class="form-container">
    <div class="form-header">
      <div class="form-welcome">Welcome to MyApp</div>
      <h1 class="form-title" id="formTitle">Sign In</h1>
      <p class="form-subtitle" id="formSubtitle">Enter your credentials to continue</p>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
      <button class="tab-btn" onclick="switchTab('reset')">Reset</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="form-submit" id="loginBtn">Sign In →</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" id="regName" placeholder="John Smith" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="regEmail" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="regPassword" placeholder="At least 6 characters" required>
      </div>
      <button type="submit" class="form-submit" id="registerBtn">Create Account →</button>
    </form>

    <!-- RESET FORM -->
    <form id="resetForm" style="display:none" onsubmit="handleReset(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="resetEmail" placeholder="you@example.com" required>
      </div>
      <div id="resetStep2" style="display:none">
        <div class="form-group">
          <label class="form-label">Reset Code</label>
          <input class="form-input" type="text" id="resetCode" placeholder="6-digit code">
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-input" type="password" id="newPassword" placeholder="New password">
        </div>
      </div>
      <button type="submit" class="form-submit" id="resetBtn">Send Reset Code →</button>
    </form>

    <div class="form-footer">
      Protected by enterprise-grade encryption
    </div>
  </div>
</div>

<script>
  const API = 'https://loginapp-production-b12c.up.railway.app';
  let resetStep = 1;

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }
  function clearMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  function switchTab(tab) {
    clearMessages();
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['login','register','reset'][i] === tab);
    });
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('resetForm').style.display = tab === 'reset' ? 'block' : 'none';
    const titles = { login: ['Sign In', 'Enter your credentials to continue'], register: ['Register', "Create your account — it's free"], reset: ['Reset Password', 'We\'ll send you a secure reset code'] };
    document.getElementById('formTitle').textContent = titles[tab][0];
    document.getElementById('formSubtitle').textContent = titles[tab][1];
    resetStep = 1;
    document.getElementById('resetStep2').style.display = 'none';
    document.getElementById('resetBtn').textContent = 'Send Reset Code →';
  }

  async function handleLogin(e) {
    e.preventDefault(); clearMessages();
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in...'; btn.disabled = true;
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      sessionStorage.setItem('token', data.token);
      sessionStorage.setItem('email', document.getElementById('loginEmail').value);
      showSuccess('Login successful! Redirecting...');
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    } catch (err) {
      showError(err.message);
    } finally {
      btn.textContent = 'Sign In →'; btn.disabled = false;
    }
  }

  async function handleRegister(e) {
    e.preventDefault(); clearMessages();
    const btn = document.getElementById('registerBtn');
    btn.textContent = 'Creating account...'; btn.disabled = true;
    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Registration failed');
      showSuccess('Account created! Please sign in.');
      setTimeout(() => switchTab('login'), 2000);
    } catch (err) {
      showError(err.message);
    } finally {
      btn.textContent = 'Create Account →'; btn.disabled = false;
    }
  }

  async function handleReset(e) {
    e.preventDefault(); clearMessages();
    const btn = document.getElementById('resetBtn');
    if (resetStep === 1) {
      btn.textContent = 'Sending...'; btn.disabled = true;
      try {
        const res = await fetch(`${API}/auth/reset`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('resetEmail').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to send code');
        showSuccess(`Reset code: ${data.resetCode}`);
        resetStep = 2;
        document.getElementById('resetStep2').style.display = 'block';
        document.getElementById('resetBtn').textContent = 'Change Password →';
      } catch (err) { showError(err.message); }
      finally { btn.disabled = false; }
    } else {
      btn.textContent = 'Changing...'; btn.disabled = true;
      try {
        const res = await fetch(`${API}/auth/reset`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('resetEmail').value,
            resetCode: document.getElementById('resetCode').value,
            newPassword: document.getElementById('newPassword').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to reset password');
        showSuccess('Password changed! Redirecting to login...');
        setTimeout(() => switchTab('login'), 2000);
      } catch (err) { showError(err.message); }
      finally { btn.textContent = 'Change Password →'; btn.disabled = false; }
    }
  }
</script>
</body>
</html>
